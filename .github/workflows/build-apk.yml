name: Build Android APK for Ghost Hub v3.1

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
      
      - name: Prepare web files
        run: |
          mkdir -p www
          cp index.html style.css script.js supabase.js service-worker.js manifest.json www/
          mkdir -p www/icons
          cp icon.png www/ 2>/dev/null || echo "No icon"
          ls -la www/
      
      - name: Inject environment variables
        run: |
          cat > www/env.js << 'EOF'
          window.ENV = {
            DATABASE_URL: '${{ secrets.DATABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          EOF
      
      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "ru.ghost.hub",
            "appName": "Ghost Hub",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "launchAutoHide": true,
                "backgroundColor": "#0A0A0A",
                "androidSplashResourceName": "splash",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": false,
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "#0A0A0A",
                "overlaysWebView": false
              }
            }
          }
          EOF
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Fix Android variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 24
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.9.0'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF
      
      - name: Fix Kotlin dependencies
        run: |
          cat >> android/build.gradle << 'EOF'
          
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF
      
      - name: Setup permissions for Android
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|screenLayout|smallestScreenSize"
                      android:name="com.ghost.hub.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="ghosthub" />
                      </intent-filter>
                      
                  </activity>
                  
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
                  
              </application>
          </manifest>
          EOF
      
      - name: Generate app icons
        run: |
          cd android/app/src/main/res
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          
          ICON_SOURCE="${{ github.workspace }}/icon.png"
          
          if [ -f "$ICON_SOURCE" ]; then
              echo "Using provided icon.png"
              sudo apt-get update && sudo apt-get install -y imagemagick
              
              convert "$ICON_SOURCE" -resize 72x72 mipmap-hdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 48x48 mipmap-mdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 96x96 mipmap-xhdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 144x144 mipmap-xxhdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 192x192 mipmap-xxxhdpi/ic_launcher.png
              
              cp mipmap-hdpi/ic_launcher.png mipmap-hdpi/ic_launcher_foreground.png
              cp mipmap-mdpi/ic_launcher.png mipmap-mdpi/ic_launcher_foreground.png
              cp mipmap-xhdpi/ic_launcher.png mipmap-xhdpi/ic_launcher_foreground.png
              cp mipmap-xxhdpi/ic_launcher.png mipmap-xxhdpi/ic_launcher_foreground.png
              cp mipmap-xxxhdpi/ic_launcher.png mipmap-xxxhdpi/ic_launcher_foreground.png
              
              convert "$ICON_SOURCE" -resize 72x72 mipmap-hdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 48x48 mipmap-mdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 96x96 mipmap-xhdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 144x144 mipmap-xxhdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 192x192 mipmap-xxxhdpi/ic_launcher_round.png
          else
              echo "No icon.png found, using default Android icon"
          fi
        continue-on-error: true
      
      - name: Create splash screen drawable
        run: |
          mkdir -p android/app/src/main/res/drawable
          
          rm -f android/app/src/main/res/drawable/splash.png
          rm -f android/app/src/main/res/drawable/splash.xml
          
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#0A0A0A"/>
          </shape>
          EOF
          
          mkdir -p android/app/src/main/res/values
          
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="splash_background">#0A0A0A</color>
              <color name="colorPrimary">#0A0A0A</color>
              <color name="colorPrimaryDark">#0A0A0A</color>
              <color name="colorAccent">#FF8C00</color>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
                  <item name="android:background">@null</item>
              </style>
              
              <style name="AppTheme.NoActionBarLaunch" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@drawable/ic_launcher_background</item>
              </style>
          </resources>
          EOF
      
      - name: Create file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          
          cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-files-path name="my_images" path="Pictures" />
              <cache-path name="cache" path="/" />
              <files-path name="files" path="/" />
          </paths>
          EOF
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Copy web assets to Android
        run: npx cap copy android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Check APK and assets
        run: |
          echo "=== Checking APK ==="
          ls -la android/app/build/outputs/apk/debug/
          
          echo "=== Checking assets in APK ==="
          unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep -E "(www|index|assets)" | head -20
          
          cp android/app/build/outputs/apk/debug/app-debug.apk Ghost-Hub-v3.1.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Hub-v3.1-APK
          path: Ghost-Hub-v3.1.apk
          retention-days: 30
      
      - name: Create Release Info
        run: |
          cat > release-info.txt << 'EOF'
          GHOST-HUB v3.1 Build Info
          =========================
          
          Дата сборки: ${{ github.run_date }}
          Коммит: ${{ github.sha }}
          
          Функции:
          - P2P чат без интернета
          - Навигатор с картами (нейтральный провайдер)
          - Детектор жучков (Bluetooth/WiFi сканер)
          - Сейсмо-анализатор (акселерометр)
          - Фоновый аудиорекордер
          - Логи событий с аудио
          - Управление оборудованием (ESP32)
          - Мониторинг пульса (BLE)
          - Голосовое управление
          - Dead Man Switch (10 мин)
          - Offline-first PWA
          
          Требования:
          - Android 7.0+ (API 24)
          - Разрешения: геолокация, микрофон, Bluetooth, уведомления
          
          Подключение оборудования:
          - ESP32-CAM: прошивка в папке esp-firmwares/camera.ino
          - ESP8266/32 реле: прошивка в esp-firmwares/relay.ino
          - ESP32 пульс: прошивка в esp-firmwares/pulse.ino
          EOF
      
      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: Release-Info
          path: release-info.txt
          retention-days: 30
