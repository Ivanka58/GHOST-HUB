name: Build Android APK for Ghost Hub v3.1

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ghost-hub-v3.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Prepare web files
        run: |
          mkdir -p www
          # Копируем все основные файлы
          cp index.html style.css script.js supabase.js service-worker.js manifest.json www/
          # Создаём папку для иконок
          mkdir -p www/icons
          # Копируем иконку если есть
          cp icon.png www/ 2>/dev/null || echo "Icon will be generated"

      - name: Inject environment variables
        run: |
          # Создаём env.js с переменными из GitHub Secrets
          cat > www/env.js << 'EOF'
          window.ENV = {
            DATABASE_URL: '${{ secrets.DATABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          EOF

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "ru.ghost.hub",
            "appName": "Ghost Hub",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 3000,
                "launchAutoHide": true,
                "backgroundColor": "#0A0A0A",
                "androidSplashResourceName": "splash",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": true,
                "spinnerColor": "#FF8C00"
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "#0A0A0A",
                "overlaysWebView": false
              }
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Fix Android variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 24
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.9.0'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

      - name: Fix Kotlin dependencies
        run: |
          cat >> android/build.gradle << 'EOF'

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Setup permissions for Android
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.ghost.hub.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="ghosthub" />
                      </intent-filter>

                  </activity>

                  <service
                      android:name="com.google.android.gms.metadata.ModuleDependencies"
                      android:enabled="false"
                      android:exported="false" />

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>
          </manifest>
          EOF

      - name: Generate app icons
        run: |
          cd android/app/src/main/res
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi

          ICON_SOURCE="${{ github.workspace }}/ghost-hub-v3.1/icon.png"

          if [ -f "$ICON_SOURCE" ]; then
              echo "Using provided icon.png"
              sudo apt-get update && sudo apt-get install -y imagemagick

              convert "$ICON_SOURCE" -resize 72x72 mipmap-hdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 48x48 mipmap-mdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 96x96 mipmap-xhdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 144x144 mipmap-xxhdpi/ic_launcher.png
              convert "$ICON_SOURCE" -resize 192x192 mipmap-xxxhdpi/ic_launcher.png

              cp mipmap-hdpi/ic_launcher.png mipmap-hdpi/ic_launcher_foreground.png
              cp mipmap-mdpi/ic_launcher.png mipmap-mdpi/ic_launcher_foreground.png
              cp mipmap-xhdpi/ic_launcher.png mipmap-xhdpi/ic_launcher_foreground.png
              cp mipmap-xxhdpi/ic_launcher.png mipmap-xxhdpi/ic_launcher_foreground.png
              cp mipmap-xxxhdpi/ic_launcher.png mipmap-xxxhdpi/ic_launcher_foreground.png

              convert "$ICON_SOURCE" -resize 72x72 mipmap-hdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 48x48 mipmap-mdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 96x96 mipmap-xhdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 144x144 mipmap-xxhdpi/ic_launcher_round.png
              convert "$ICON_SOURCE" -resize 192x192 mipmap-xxxhdpi/ic_launcher_round.png
          else
              echo "No icon.png found, using default Android icon"
          fi
        continue-on-error: true

      - name: Create splash screen drawable
        run: |
          mkdir -p android/app/src/main/res/drawable

          cat > android/app/src/main/res/drawable/splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/splash_background" />
              <item
                  android:width="120dp"
                  android:height="120dp"
                  android:gravity="center">
                  <bitmap android:src="@mipmap/ic_launcher_foreground" />
              </item>
          </la<response clipped><NOTE>Result is longer than **10000 characters**, will be **truncated**.</NOTE>
