name: Build Android APK for Ghost Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
      
      - name: Prepare web files
        run: |
          mkdir -p www
          cp index.html style.css script.js manifest.json icon.png www/
      
      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ghost.hub",
            "appName": "Ghost Hub",
            "webDir": "www",
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#000000"
              }
            }
          }
          EOF
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Fix Android variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.9.0'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF
      
      - name: Fix Kotlin dependencies
        run: |
          cat >> android/build.gradle << 'EOF'
          
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF
      
      # Устанавливаем иконку приложения
      - name: Generate app icons
        run: |
          cd android/app/src/main/res
          
          # Создаём папки для иконок
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          
          # Конвертируем icon.png в разные размеры
          # Для этого установим ImageMagick
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Генерируем иконки разных размеров
          convert /home/runner/work/GHOST-HUB/GHOST-HUB/icon.png -resize 72x72 mipmap-hdpi/ic_launcher.png
          convert /home/runner/work/GHOST-HUB/GHOST-HUB/icon.png -resize 48x48 mipmap-mdpi/ic_launcher.png
          convert /home/runner/work/GHOST-HUB/GHOST-HUB/icon.png -resize 96x96 mipmap-xhdpi/ic_launcher.png
          convert /home/runner/work/GHOST-HUB/GHOST-HUB/icon.png -resize 144x144 mipmap-xxhdpi/ic_launcher.png
          convert /home/runner/work/GHOST-HUB/GHOST-HUB/icon.png -resize 192x192 mipmap-xxxhdpi/ic_launcher.png
          
          # Копируем как foreground тоже
          cp mipmap-hdpi/ic_launcher.png mipmap-hdpi/ic_launcher_foreground.png
          cp mipmap-mdpi/ic_launcher.png mipmap-mdpi/ic_launcher_foreground.png
          cp mipmap-xhdpi/ic_launcher.png mipmap-xhdpi/ic_launcher_foreground.png
          cp mipmap-xxhdpi/ic_launcher.png mipmap-xxhdpi/ic_launcher_foreground.png
          cp mipmap-xxxhdpi/ic_launcher.png mipmap-xxxhdpi/ic_launcher_foreground.png
        continue-on-error: true
      
      - name: Sync project
        run: npx cap sync android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Hub-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
